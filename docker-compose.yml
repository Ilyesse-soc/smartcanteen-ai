services:
  db:
    image: postgres:16-alpine
    container_name: smartcanteen-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartcanteen}
      POSTGRES_USER: ${POSTGRES_USER:-smartcanteen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartcanteen}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcanteen-api
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
