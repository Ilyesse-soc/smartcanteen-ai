services:
  backend:
    image: python:3.11-slim
    container_name: smartcanteen-backend-mock
    working_dir: /app
    command: sh -c "python -m http.server 8000"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - shared_data:/shared_data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: smartcanteen-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    image: python:3.11-slim
    container_name: smartcanteen-worker
    working_dir: /worker
    command: sh -c "pip install --no-cache-dir -r requirements.txt && celery -A worker worker --loglevel=info"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SHARED_DATA_DIR: /shared_data
      WORKER_MODELS_DIR: /shared_data/models
    volumes:
      - ./worker:/worker
      - shared_data:/shared_data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  shared_data:
